<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1945 - Flying Tigers</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
        }
        
        body {
            background: #0a0a0f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Press Start 2P', monospace;
            overflow: hidden;
        }
        
        #gameContainer {
            position: relative;
            border: 4px solid #333;
            box-shadow: 0 0 30px rgba(255, 200, 0, 0.3);
        }
        
        #gameCanvas {
            display: block;
            background: #1a1a2e;
        }
        
        #controls {
            position: absolute;
            bottom: -60px;
            left: 0;
            right: 0;
            text-align: center;
            color: #666;
            font-size: 10px;
            line-height: 1.8;
        }
        
        /* Mobile Control Buttons - Always visible for testing */
        .mobile-controls {
            position: fixed;
            bottom: 15px;
            right: 15px;
            display: flex;
            gap: 10px;
            z-index: 100;
        }
        
        .mobile-controls-left {
            position: fixed;
            bottom: 15px;
            left: 15px;
            display: flex;
            gap: 10px;
            z-index: 100;
        }
        
        .control-btn {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 11px;
            font-weight: bold;
            user-select: none;
            -webkit-user-select: none;
            pointer-events: auto;
            touch-action: manipulation;
            -webkit-touch-callout: none;
            transition: transform 0.1s, background 0.1s;
            position: relative;
            z-index: 1000;
        }
        
        .control-btn svg {
            width: 28px;
            height: 28px;
        }
        
        #fireBtn {
            background: rgba(255, 200, 0, 0.35);
            border: 3px solid #FFD700;
            color: #FFD700;
            box-shadow: 0 0 15px rgba(255, 200, 0, 0.3);
        }
        
        #fireBtn:active, #fireBtn.pressed {
            background: rgba(255, 200, 0, 0.7);
            transform: scale(0.9);
            box-shadow: 0 0 25px rgba(255, 200, 0, 0.6);
        }
        
        #bombBtn {
            background: rgba(255, 60, 60, 0.35);
            border: 3px solid #FF6B6B;
            color: #FF6B6B;
            box-shadow: 0 0 15px rgba(255, 60, 60, 0.3);
        }
        
        #bombBtn:active, #bombBtn.pressed {
            background: rgba(255, 60, 60, 0.7);
            transform: scale(0.9);
            box-shadow: 0 0 25px rgba(255, 60, 60, 0.6);
        }
        
        /* Touch indicator */
        #touchIndicator {
            position: fixed;
            bottom: 85px;
            right: 20px;
            display: none;
            color: rgba(255, 200, 0, 0.7);
            font-size: 9px;
            text-align: center;
            pointer-events: none;
        }
        
        /* Show controls on touch devices */
        @media (hover: none) and (pointer: coarse) {
            .mobile-controls {
                display: flex;
            }
            .mobile-controls-left {
                display: flex;
            }
            #controls {
                display: none;
            }
        }
        
        /* Adjust for small screens */
        @media (max-width: 520px) {
            #gameContainer {
                border-width: 2px;
            }
            #gameCanvas {
                width: 100vw !important;
                height: calc(100vw * 1.5) !important;
                max-height: 75vh;
            }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="480" height="720"></canvas>
        <div id="controls">
            MOVE: Arrow Keys / WASD | SHOOT: Space | BOMB: B | PAUSE: P
        </div>
        
        <!-- Mobile Control Buttons -->
        <div class="mobile-controls-left">
            <button id="leftBtn" class="control-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M15 18l-6-6 6-6"/>
                </svg>
            </button>
            <button id="rightBtn" class="control-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M9 18l6-6-6-6"/>
                </svg>
            </button>
            <button id="upBtn" class="control-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M18 15l-6-6-6 6"/>
                </svg>
            </button>
            <button id="downBtn" class="control-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M6 9l6 6 6-6"/>
                </svg>
            </button>
        </div>
        
        <div class="mobile-controls">
            <button id="fireBtn" class="control-btn">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <circle cx="12" cy="12" r="6"/>
                </svg>
            </button>
            <button id="bombBtn" class="control-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="14" r="8"/>
                    <path d="M12 6V2M9 3h6"/>
                    <path d="M8 12l3 3 5-5"/>
                </svg>
            </button>
        </div>
    </div>
    
    <script src="game.js"></script>
</body>
</html>

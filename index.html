<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1945 - Flying Tigers</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
        }
        
        body {
            background: #0a0a0f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Press Start 2P', monospace;
            overflow: hidden;
        }
        
        #gameContainer {
            position: relative;
            border: 4px solid #333;
            box-shadow: 0 0 30px rgba(255, 200, 0, 0.3);
        }
        
        #gameCanvas {
            display: block;
            background: #1a1a2e;
        }
        
        #controls {
            position: absolute;
            bottom: -60px;
            left: 0;
            right: 0;
            text-align: center;
            color: #666;
            font-size: 10px;
            line-height: 1.8;
        }
        
        /* Bomb indicator */
        #bombIndicator {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 44px;
            height: 44px;
            background: rgba(255, 80, 80, 0.25);
            border: 3px solid rgba(255, 80, 80, 0.6);
            border-radius: 50%;
            display: none;
            justify-content: center;
            align-items: center;
            color: rgba(255, 255, 255, 0.9);
            font-size: 11px;
            font-weight: bold;
            pointer-events: auto;
            user-select: none;
            -webkit-user-select: none;
            z-index: 100;
        }
        
        #bombIndicator:active {
            background: rgba(255, 80, 80, 0.5);
            transform: scale(0.95);
        }
        
        /* Show bomb indicator on touch devices during gameplay */
        @media (hover: none) and (pointer: coarse) {
            #bombIndicator {
                display: flex;
            }
            #controls {
                display: none;
            }
        }
        
        /* Adjust for small screens */
        @media (max-width: 520px) {
            #gameContainer {
                border-width: 2px;
            }
            #gameCanvas {
                width: 100vw !important;
                height: calc(100vw * 1.5) !important;
                max-height: 75vh;
            }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="480" height="720"></canvas>
        <div id="controls">
            MOVE: Arrow Keys / WASD | SHOOT: Space | BOMB: B | PAUSE: P
        </div>
        
        <!-- Bomb indicator for mobile -->
        <div id="bombIndicator">B</div>
    </div>
    
    <script src="game.js"></script>
</body>
</html>

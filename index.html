<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1945 - Flying Tigers</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
        }
        
        body {
            background: #0a0a0f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Press Start 2P', monospace;
            overflow: hidden;
        }
        
        #gameContainer {
            position: relative;
            border: 4px solid #333;
            box-shadow: 0 0 30px rgba(255, 200, 0, 0.3);
        }
        
        #gameCanvas {
            display: block;
            background: #1a1a2e;
        }
        
        #controls {
            position: absolute;
            bottom: -60px;
            left: 0;
            right: 0;
            text-align: center;
            color: #666;
            font-size: 10px;
            line-height: 1.8;
        }
        
        /* Mobile Control Buttons */
        .mobile-controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: none;
            gap: 12px;
            z-index: 100;
        }
        
        .control-btn {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 12px;
            font-weight: bold;
            user-select: none;
            -webkit-user-select: none;
            pointer-events: auto;
        }
        
        #fireBtn {
            background: rgba(255, 200, 0, 0.3);
            border: 3px solid rgba(255, 200, 0, 0.7);
            color: #FFD700;
        }
        
        #fireBtn:active, #fireBtn.pressed {
            background: rgba(255, 200, 0, 0.6);
            transform: scale(0.92);
        }
        
        #bombBtn {
            background: rgba(255, 80, 80, 0.3);
            border: 3px solid rgba(255, 80, 80, 0.7);
            color: #FF6B6B;
        }
        
        #bombBtn:active, #bombBtn.pressed {
            background: rgba(255, 80, 80, 0.6);
            transform: scale(0.92);
        }
        
        /* Show controls on touch devices */
        @media (hover: none) and (pointer: coarse) {
            .mobile-controls {
                display: flex;
            }
            #controls {
                display: none;
            }
        }
        
        /* Adjust for small screens */
        @media (max-width: 520px) {
            #gameContainer {
                border-width: 2px;
            }
            #gameCanvas {
                width: 100vw !important;
                height: calc(100vw * 1.5) !important;
                max-height: 75vh;
            }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="480" height="720"></canvas>
        <div id="controls">
            MOVE: Arrow Keys / WASD | SHOOT: Space | BOMB: B | PAUSE: P
        </div>
        
        <!-- Mobile Control Buttons -->
        <div class="mobile-controls">
            <button id="fireBtn" class="control-btn">FIRE</button>
            <button id="bombBtn" class="control-btn">BOMB</button>
        </div>
    </div>
    
    <script src="game.js"></script>
</body>
</html>

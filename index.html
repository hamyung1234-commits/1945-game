<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1945 - Flying Tigers</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
        }
        
        body {
            background: #0a0a0f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Press Start 2P', monospace;
            overflow: hidden;
        }
        
        #gameContainer {
            position: relative;
            border: 4px solid #333;
            box-shadow: 0 0 30px rgba(255, 200, 0, 0.3);
        }
        
        #gameCanvas {
            display: block;
            background: #1a1a2e;
        }
        
        #controls {
            position: absolute;
            bottom: -60px;
            left: 0;
            right: 0;
            text-align: center;
            color: #666;
            font-size: 10px;
            line-height: 1.8;
        }
        
        /* Mobile Controls */
        #mobileControls {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 200px;
            pointer-events: none;
        }
        
        .control-btn {
            position: absolute;
            width: 70px;
            height: 70px;
            background: rgba(255, 255, 255, 0.15);
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: rgba(255, 255, 255, 0.7);
            font-size: 24px;
            pointer-events: auto;
            user-select: none;
            -webkit-user-select: none;
            transition: background 0.1s;
        }
        
        .control-btn:active, .control-btn.active {
            background: rgba(255, 255, 255, 0.35);
        }
        
        #btnLeft {
            left: 30px;
            bottom: 30px;
        }
        
        #btnRight {
            left: 170px;
            bottom: 30px;
        }
        
        #btnUp {
            left: 100px;
            bottom: 100px;
        }
        
        #btnDown {
            left: 100px;
            bottom: 30px;
        }
        
        #btnFire {
            right: 30px;
            bottom: 30px;
            width: 90px;
            height: 90px;
            background: rgba(255, 100, 100, 0.2);
            border-color: rgba(255, 100, 100, 0.5);
        }
        
        #btnBomb {
            right: 140px;
            bottom: 50px;
            width: 50px;
            height: 50px;
            font-size: 14px;
        }
        
        /* Show mobile controls on touch devices */
        @media (hover: none) and (pointer: coarse) {
            #mobileControls {
                display: block;
            }
            #controls {
                display: none;
            }
        }
        
        /* Adjust for small screens */
        @media (max-width: 520px) {
            #gameContainer {
                border-width: 2px;
            }
            #gameCanvas {
                width: 100vw !important;
                height: calc(100vw * 1.5) !important;
                max-height: 75vh;
            }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="480" height="720"></canvas>
        <div id="controls">
            MOVE: Arrow Keys / WASD | SHOOT: Space | BOMB: B | PAUSE: P
        </div>
        
        <!-- Mobile Controls -->
        <div id="mobileControls">
            <div id="btnLeft" class="control-btn">◀</div>
            <div id="btnRight" class="control-btn">▶</div>
            <div id="btnUp" class="control-btn">▲</div>
            <div id="btnDown" class="control-btn">▼</div>
            <div id="btnFire" class="control-btn">🔥</div>
            <div id="btnBomb" class="control-btn">💣</div>
        </div>
    </div>
    
    <script src="game.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>1945 - Flying Tigers</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #0a0a0f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Press Start 2P', monospace;
            overflow: hidden;
        }
        
        #gameContainer {
            position: relative;
            width: 480px;
            height: 720px;
            border: 4px solid #333;
            box-shadow: 0 0 30px rgba(255, 200, 0, 0.3);
        }
        
        #gameCanvas {
            display: block;
            background: #1a1a2e;
            width: 100%;
            height: 100%;
        }
        
        /* Mobile Control Buttons */
        .mobile-controls {
            position: absolute;
            bottom: 60px;
            right: 10px;
            display: none;
            flex-direction: column;
            gap: 8px;
            z-index: 10;
        }
        
        /* Show controls on touch devices */
        body.touch-device .mobile-controls {
            display: flex;
        }
        
        .control-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            -webkit-user-select: none;
            pointer-events: auto;
            touch-action: manipulation;
            transition: transform 0.1s, background 0.1s;
            cursor: pointer;
        }
        
        .control-btn svg {
            width: 24px;
            height: 24px;
        }
        
        #fireBtn {
            background: rgba(255, 200, 0, 0.4);
            border: 2px solid #FFD700;
            color: #FFD700;
        }
        
        #fireBtn:active, #fireBtn.pressed {
            background: rgba(255, 200, 0, 0.8);
            transform: scale(0.95);
        }
        
        #bombBtn {
            background: rgba(255, 60, 60, 0.4);
            border: 2px solid #FF6B6B;
            color: #FF6B6B;
        }
        
        #bombBtn:active, #bombBtn.pressed {
            background: rgba(255, 60, 60, 0.8);
            transform: scale(0.95);
        }
        
        #controls {
            position: absolute;
            bottom: 10px;
            left: 0;
            right: 0;
            text-align: center;
            color: #666;
            font-size: 8px;
            line-height: 1.6;
        }
        
        /* Adjust for small screens */
        @media (max-width: 520px) {
            #gameContainer {
                width: 100vw;
                height: calc(100vw * 1.5);
                max-height: 100vh;
                border-width: 2px;
            }
            
            .mobile-controls {
                bottom: 50px;
                right: 8px;
            }
            
            .control-btn {
                width: 45px;
                height: 45px;
            }
            
            .control-btn svg {
                width: 22px;
                height: 22px;
            }
        }
        
        @media (max-height: 750px) and (max-width: 520px) {
            #gameContainer {
                height: 100vh;
                width: calc(100vh / 1.5);
            }
        }
    </style>
</head>
<body>
    <script>
        // Detect touch device and add class
        if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
            document.body.classList.add('touch-device');
        }
    </script>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="480" height="720"></canvas>
        
        <!-- Mobile Control Buttons - positioned at bottom right inside container -->
        <div class="mobile-controls">
            <button id="fireBtn" class="control-btn">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <circle cx="12" cy="12" r="6"/>
                </svg>
            </button>
            <button id="bombBtn" class="control-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <circle cx="12" cy="14" r="7"/>
                    <path d="M12 7V4M9 5h6"/>
                </svg>
            </button>
        </div>
        
        <div id="controls">
            MOVE: Arrow Keys / WASD | SHOOT: Space | BOMB: B | PAUSE: P
        </div>
    </div>
    
    <script src="game.js"></script>
</body>
</html>
